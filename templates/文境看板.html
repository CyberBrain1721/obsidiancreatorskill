<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文境 · 看板</title>
<style>
  :root {
    --bg: #0d0f12; --surface: #15181d; --border: #262a30;
    --text: #c8ccd4; --text-muted: #6b7080; --text-dim: #4a4f5c;
    --accent: #a78bfa; --gold: #d4a853; --green: #4ade80;
    --radius: 10px; --radius-sm: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 24px; }
  .header h1 { font-size: 28px; font-weight: 700; color: #f0f2f5; letter-spacing: 0.04em; }
  .header .sub { font-size: 13px; color: var(--text-muted); font-style: italic; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .card-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .icon {
    font-size: 16px; width: 28px; height: 28px; display: flex;
    align-items: center; justify-content: center; border-radius: var(--radius-sm); font-weight: 700;
    background: rgba(167,139,250,0.15); color: var(--accent);
  }
  .card-header h3 { font-size: 15px; font-weight: 600; color: #e0e3e8; }

  .triggers { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 14px; padding: 4px 12px; border-radius: 12px;
    background: rgba(255,255,255,0.04); color: var(--text-muted);
    border: 1px solid transparent; transition: all 0.15s;
  }
  .tag:hover { background: rgba(255,255,255,0.07); color: #e0e3e8; border-color: var(--border); }

  .status-bar {
    margin-top: 16px; padding: 12px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    display: flex; align-items: center; gap: 12px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .status-text { font-size: 13px; color: var(--text-muted); }
  .status-text strong { color: var(--text); }
  .status-date { margin-left: auto; font-size: 12px; color: var(--text-dim); }

  .tagline {
    text-align: center; font-size: 13px; color: var(--text-muted);
    margin-bottom: 28px;
  }
  .tagline span { color: var(--gold); }

  @media (max-width: 500px) { body { padding: 16px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>文境</h1>
    <div class="sub">Human Self-Governance in the AI Era</div>
  </div>

  <div class="tagline">
    道 → 境 → 卷 → 归藏 ⇢ 典阁 ↻ 卷 &nbsp;·&nbsp; <span>第一个念头，永远是人的</span>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="icon">⚡</div>
      <h3>共创指令</h3>
    </div>
    <div class="triggers">
      <span class="tag">收录 → "收录 [内容或URL]"</span>
      <span class="tag">共创 → "共创"</span>
      <span class="tag">成卷 → "成卷"</span>
      <span class="tag">入典 → "入典 [描述]"</span>
      <span class="tag">整理 → "整理"</span>
      <span class="tag">刷新看板 → "刷新看板"</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text"><strong>文境就绪</strong> · 道 → 境 → 卷 → 归藏 ⇢ 典阁</div>
    <div class="status-date" id="status-date">VAULT_NAME</div>
  </div>
</div>
</body>
</html>
